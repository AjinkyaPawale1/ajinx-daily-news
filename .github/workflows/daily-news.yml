name: Daily news refresh

on:
  schedule:
    # GitHub Actions cron runs in UTC and can't express "9am US/Eastern"
    # directly since ET shifts between EST (UTC-5) and EDT (UTC-4). We fire
    # at both possible UTC times and the "Check it's 9am ET" step below skips
    # the run that doesn't actually land on 9am ET that day.
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-news-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check it's 9am ET
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — skipping the 9am ET time gate."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour="$(TZ='America/New_York' date +%H)"
          if [ "$hour" = "09" ]; then
            echo "It's 9am ET — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Current ET hour is $hour, not 09 — skipping this scheduled firing."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.gate.outputs.proceed == 'true'
        run: npm install

      - name: Fetch today's news
        if: steps.gate.outputs.proceed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run fetch-news

      - name: Commit and push updated news data
        if: steps.gate.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "No news changes to commit."
            exit 0
          fi
          today="$(TZ='America/New_York' date +%Y-%m-%d)"
          git add data/
          git commit -m "Daily news refresh — ${today}"
          git push origin HEAD:main
