<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajinx Daily News</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B0%3C/text%3E%3C/svg%3E">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
    color: #fff; padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    position: sticky; top: 0; z-index: 100;
    flex-wrap: wrap; gap: 12px;
  }
  .header-left h1 { font-size: 1.4rem; font-weight: 700; }
  .header-left p { font-size: 0.78rem; color: #a0aec0; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #last-updated {
    font-size: 0.75rem; color: #a0aec0;
    background: rgba(255,255,255,0.08);
    padding: 5px 12px; border-radius: 20px;
    white-space: nowrap;
  }
  #history-select {
    font-size: 0.75rem; color: #fff;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 5px 10px; border-radius: 20px;
    cursor: pointer;
  }
  #history-select option { color: #1a1a2e; }
  .category-nav {
    background: #fff; padding: 0 28px;
    display: flex; gap: 2px; overflow-x: auto;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); scrollbar-width: none;
  }
  .category-nav::-webkit-scrollbar { display: none; }
  .cat-btn {
    padding: 13px 16px; border: none; background: none;
    font-size: 0.8rem; font-weight: 600; color: #718096;
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: color 0.2s, border-color 0.2s;
  }
  .cat-btn:hover { color: #1a1a2e; }
  .cat-btn.active { color: #e53e3e; border-bottom-color: #e53e3e; }
  main { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }
  .category-section { margin-bottom: 36px; display: none; }
  .category-section.visible { display: block; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .section-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
  }
  .section-title { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
  .section-subtitle { font-size: 0.75rem; color: #718096; }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 16px;
  }
  .news-card {
    background: #fff; border-radius: 14px;
    overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
  }
  .news-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .card-image {
    width: 100%; height: 160px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.6rem; flex-shrink: 0; overflow: hidden; position: relative;
  }
  .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
  .card-category-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: 4px; margin-bottom: 8px;
  }
  .card-title { font-size: 0.88rem; font-weight: 700; line-height: 1.35; color: #1a1a2e; margin-bottom: 10px; }
  .card-bullets { list-style: none; flex: 1; margin-bottom: 12px; }
  .card-bullets li {
    font-size: 0.78rem; color: #4a5568;
    line-height: 1.5; padding: 2px 0 2px 13px; position: relative;
  }
  .card-bullets li::before { content: '•'; position: absolute; left: 0; color: #e53e3e; font-weight: 900; }
  .card-footer {
    border-top: 1px solid #f0f0f0; padding-top: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-source { font-size: 0.7rem; color: #a0aec0; font-weight: 500; }
  .card-link { font-size: 0.73rem; font-weight: 700; color: #e53e3e; text-decoration: none; transition: color 0.2s; }
  .card-link:hover { color: #c53030; }

  /* Themes */
  .theme-us      { --cc:#3182ce; --cb:#ebf8ff; }
  .theme-global  { --cc:#805ad5; --cb:#faf5ff; }
  .theme-india   { --cc:#dd6b20; --cb:#fffaf0; }
  .theme-stocks  { --cc:#38a169; --cb:#f0fff4; }
  .theme-business{ --cc:#2b6cb0; --cb:#dbeafe; }
  .theme-tech    { --cc:#e53e3e; --cb:#fff5f5; }
  .news-card .card-category-tag { background: var(--cb,#f0f0f0); color: var(--cc,#666); }
  .section-icon.theme-us      { background:#ebf8ff; }
  .section-icon.theme-global  { background:#faf5ff; }
  .section-icon.theme-india   { background:#fffaf0; }
  .section-icon.theme-stocks  { background:#f0fff4; }
  .section-icon.theme-business{ background:#dbeafe; }
  .section-icon.theme-tech    { background:#fff5f5; }
  .card-image.theme-us      { background:#ebf8ff; }
  .card-image.theme-global  { background:#faf5ff; }
  .card-image.theme-india   { background:#fffaf0; }
  .card-image.theme-stocks  { background:#f0fff4; }
  .card-image.theme-business{ background:#dbeafe; }
  .card-image.theme-tech    { background:#fff5f5; }

  .banner {
    font-size: 0.8rem; padding: 10px 20px; text-align: center;
  }
  .stale-banner { background: #fffbea; border: 1px solid #f6d860; color: #744210; }
  .error-banner { background: #fff5f5; border: 1px solid #feb2b2; color: #742a2a; }
  .empty-state { text-align: center; padding: 60px 20px; color: #718096; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📰 Ajinx Daily News</h1>
    <p>US · Global · India · Markets · Business · Tech</p>
  </div>
  <div class="header-right">
    <select id="history-select" aria-label="Select date"></select>
    <span id="last-updated"></span>
  </div>
</header>

<div id="stale-banner" class="banner stale-banner" style="display:none">
  ⏰ This feed is from a previous day. It refreshes automatically at 9 AM ET via a scheduled GitHub Action.
</div>
<div id="error-banner" class="banner error-banner" style="display:none"></div>

<nav class="category-nav" id="category-nav">
  <button class="cat-btn active" data-cat="all">🌐 All</button>
</nav>

<main id="main"></main>

<script>
const CAT_META = {
  us:       { icon: '🇺🇸', theme: 'theme-us' },
  global:   { icon: '🌍', theme: 'theme-global' },
  india:    { icon: '🇮🇳', theme: 'theme-india' },
  stocks:   { icon: '📈', theme: 'theme-stocks' },
  business: { icon: '💼', theme: 'theme-business' },
  tech:     { icon: '💡', theme: 'theme-tech' },
};
const CAT_ORDER = ['us', 'global', 'india', 'stocks', 'business', 'tech'];
const CAT_LABELS = {
  us: '🇺🇸 US News', global: '🌍 Global', india: '🇮🇳 India',
  stocks: '📈 Stocks', business: '💼 Business', tech: '💡 Tech',
};
const MAX_HISTORY_ITEMS = 5;

const THEME_COLORS = {
  'theme-us':       {c:'#3182ce', l:'#ebf8ff'},
  'theme-global':   {c:'#805ad5', l:'#faf5ff'},
  'theme-india':    {c:'#dd6b20', l:'#fffaf0'},
  'theme-stocks':   {c:'#38a169', l:'#f0fff4'},
  'theme-business': {c:'#2b6cb0', l:'#dbeafe'},
  'theme-tech':     {c:'#e53e3e', l:'#fff5f5'},
};

let currentCat = 'all';

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cardSvg(emoji, theme) {
  const t = THEME_COLORS[theme] || {c:'#666', l:'#f0f0f0'};
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160">
    <rect width="400" height="160" fill="${t.l}"/>
    <circle cx="370" cy="-20" r="120" fill="${t.c}" fill-opacity="0.13"/>
    <circle cx="30" cy="180" r="90" fill="${t.c}" fill-opacity="0.09"/>
    <circle cx="200" cy="80" r="50" fill="${t.c}" fill-opacity="0.06"/>
    <rect x="0" y="130" width="400" height="30" fill="${t.c}" fill-opacity="0.08"/>
    <text x="200" y="88" font-size="62" text-anchor="middle" dominant-baseline="middle">${emoji || '📰'}</text>
  </svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

function showCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.querySelectorAll('.category-section').forEach(s => {
    s.classList.toggle('visible', cat === 'all' || s.dataset.cat === cat);
  });
}

function buildNav(categories) {
  const nav = document.getElementById('category-nav');
  const keys = CAT_ORDER.filter(k => categories[k]);
  nav.innerHTML = '<button class="cat-btn active" data-cat="all">🌐 All</button>' +
    keys.map(k => `<button class="cat-btn" data-cat="${k}">${esc(CAT_LABELS[k] || k)}</button>`).join('');
  nav.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => showCat(btn.dataset.cat));
  });
}

function renderNews(data) {
  const categories = data.categories || {};
  buildNav(categories);
  currentCat = 'all';

  const main = document.getElementById('main');
  const keys = CAT_ORDER.filter(k => categories[k]);

  if (keys.length === 0) {
    main.innerHTML = '<div class="empty-state">No news data available for this date.</div>';
  } else {
    main.innerHTML = keys.map(id => {
      const cat = categories[id];
      const theme = CAT_META[id]?.theme || 'theme-tech';
      const icon = cat.icon || CAT_META[id]?.icon || '📰';
      const cards = (cat.articles || []).map(a => `
        <div class="news-card ${theme}">
          <div class="card-image ${theme}">
            <img src="${cardSvg(a.emoji, theme)}" alt="${esc(a.title)}">
          </div>
          <div class="card-body">
            <span class="card-category-tag">${esc(cat.label || id)}</span>
            <h3 class="card-title">${esc(a.title)}</h3>
            <ul class="card-bullets">
              ${(a.bullets || []).map(b => `<li>${esc(b)}</li>`).join('')}
            </ul>
            <div class="card-footer">
              <span class="card-source">${esc(a.source)}</span>
              ${a.url ? `<a class="card-link" href="${esc(a.url)}" target="_blank" rel="noopener">Read more →</a>` : ''}
            </div>
          </div>
        </div>`).join('');
      return `
        <section class="category-section visible" data-cat="${id}">
          <div class="section-header">
            <div class="section-icon ${theme}">${icon}</div>
            <div>
              <div class="section-title">${esc(cat.label || id)}</div>
              <div class="section-subtitle">${esc(cat.subtitle || '')}</div>
            </div>
          </div>
          <div class="cards-grid">${cards}</div>
        </section>`;
    }).join('');
  }

  document.getElementById('last-updated').textContent = `📅 ${data.displayDate || data.date || ''}`;

  const staleBanner = document.getElementById('stale-banner');
  const isLatestSelected = document.getElementById('history-select').value === (window.__latestDate || '');
  if (isLatestSelected && data.date) {
    const feedDay = new Date(`${data.date}T00:00:00`).toDateString();
    const today = new Date().toDateString();
    staleBanner.style.display = (feedDay !== today) ? 'block' : 'none';
  } else {
    staleBanner.style.display = 'none';
  }
}

function showError(message) {
  const banner = document.getElementById('error-banner');
  banner.textContent = `⚠️ ${message}`;
  banner.style.display = 'block';
  document.getElementById('main').innerHTML = '<div class="empty-state">Unable to load news right now. Please try again later.</div>';
}

function formatDateLabel(isoDate, isLatest) {
  const d = new Date(`${isoDate}T00:00:00`);
  const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  return isLatest ? `Today · ${label}` : label;
}

async function loadDate(isoDate) {
  try {
    const res = await fetch(`data/history/${isoDate}.json`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('error-banner').style.display = 'none';
    renderNews(data);
  } catch (err) {
    showError(`Couldn't load news for ${isoDate}. ${err.message || ''}`);
  }
}

async function init() {
  try {
    const res = await fetch('data/index.json', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const manifest = await res.json();
    const dates = (manifest.dates || []).slice(0, MAX_HISTORY_ITEMS);

    if (dates.length === 0) throw new Error('No history entries found.');

    window.__latestDate = dates[0];

    const select = document.getElementById('history-select');
    select.innerHTML = dates.map((d, i) =>
      `<option value="${d}">${esc(formatDateLabel(d, i === 0))}</option>`
    ).join('');
    select.addEventListener('change', () => loadDate(select.value));

    await loadDate(dates[0]);
  } catch (err) {
    showError(`Couldn't load the news archive. ${err.message || ''}`);
  }
}

init();
</script>
</body>
</html>
